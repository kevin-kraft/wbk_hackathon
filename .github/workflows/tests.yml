name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel an in-progress run when a newer commit is pushed to the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The suite is GPU/network-free and mocks the heavy model layers, so the
      # light `dev` group from pyproject.toml is all that's needed.
      - name: Install test dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      # `npm run build` = `tsc -b && vite build`, so this gates both the
      # TypeScript type-check and a clean production build of the dashboard.
      - name: Type-check and build
        run: npm run build
