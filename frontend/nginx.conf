server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime endpoint config: never cache, so editing the mounted config.json and
    # reloading the browser immediately re-points the dashboard.
    location = /config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # HashRouter means deep links resolve client-side; this fallback is just belt-and-braces.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
